name: Release AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Snapix
  APP_ID: io.github.snapix.Snapix
  BIN_NAME: snapix

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            libadwaita-1-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            librsvg2-bin \
            libx11-dev \
            libxrandr-dev \
            patchelf \
            pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --bin snapix

      - name: Prepare AppDir
        run: |
          desktop-file-validate data/${APP_ID}.desktop

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/metainfo
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          install -Dm755 target/release/${BIN_NAME} AppDir/usr/bin/${BIN_NAME}
          install -Dm644 data/${APP_ID}.desktop AppDir/usr/share/applications/${APP_ID}.desktop
          install -Dm644 data/${APP_ID}.metainfo.xml AppDir/usr/share/metainfo/${APP_ID}.metainfo.xml
          install -Dm644 data/icons/hicolor/scalable/apps/${APP_ID}.svg AppDir/usr/share/icons/hicolor/scalable/apps/${APP_ID}.svg

          rsvg-convert \
            -w 256 \
            -h 256 \
            data/icons/hicolor/scalable/apps/${APP_ID}.svg \
            -o AppDir/usr/share/icons/hicolor/256x256/apps/${APP_ID}.png

      - name: Download AppImage tooling
        run: |
          curl -fsSL -o linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/latest/download/linuxdeploy-x86_64.AppImage
          curl -fsSL -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/latest/download/appimagetool-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh

          chmod +x linuxdeploy.AppImage appimagetool.AppImage linuxdeploy-plugin-gtk.sh

      - name: Build AppImage
        run: |
          export VERSION="${GITHUB_REF_NAME:-dev}"
          export VERSION="${VERSION#v}"
          export ARCH=x86_64
          export TARGET_APPIMAGE="${APP_NAME}-${VERSION}-x86_64.AppImage"

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/${APP_ID}.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/${APP_ID}.svg \
            --executable AppDir/usr/bin/${BIN_NAME} \
            --plugin gtk

          ls -la
          find AppDir -maxdepth 3 -type f | sort | sed -n '1,120p'

          ./appimagetool.AppImage AppDir "${TARGET_APPIMAGE}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-AppImage
          path: ${{ env.APP_NAME }}-*.AppImage

      - name: Attach AppImage to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}-*.AppImage
          generate_release_notes: true
