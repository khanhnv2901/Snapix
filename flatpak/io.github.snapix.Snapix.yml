app-id: io.github.snapix.Snapix
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: snapix

finish-args:
  # Wayland & X11 display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Portal access for screenshots
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Screenshot
  # File access for saving screenshots
  - --filesystem=xdg-pictures/Screenshots:create
  - --filesystem=xdg-download:create
  # Clipboard access
  - --socket=session-bus

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/snapix/cargo
    RUST_BACKTRACE: '1'

modules:
  - name: snapix
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/snapix /app/bin/snapix
      - install -Dm644 data/io.github.snapix.Snapix.desktop /app/share/applications/io.github.snapix.Snapix.desktop
      - install -Dm644 data/io.github.snapix.Snapix.metainfo.xml /app/share/metainfo/io.github.snapix.Snapix.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.snapix.Snapix.svg /app/share/icons/hicolor/scalable/apps/io.github.snapix.Snapix.svg
    sources:
      - type: dir
        path: ..
      # Cargo sources will be generated by flatpak-cargo-generator
      # - cargo-sources.json
