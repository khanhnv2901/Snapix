app-id: io.github.snapix.Snapix
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: snapix

finish-args:
  # Wayland & X11 display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Portal access for screenshots
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.Screenshot
  # File access for saving screenshots
  - --filesystem=xdg-pictures/Screenshots:create
  - --filesystem=xdg-download:create
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /share/man
  - /share/info
  - /share/doc
  - /share/gtk-doc
  - /share/vala
  - /lib/debug

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/snapix/cargo
    RUST_BACKTRACE: '1'
    # Optimize for size
    CARGO_PROFILE_RELEASE_STRIP: 'true'
    CARGO_PROFILE_RELEASE_LTO: 'thin'

modules:
  - name: snapix
    buildsystem: simple
    build-commands:
      # Build the application. Flathub builds must provide Cargo sources
      # separately via cargo-sources.json so this can run offline.
      - cargo --offline build --release --verbose --bin snapix
      # Install the binary
      - install -Dm755 target/release/snapix /app/bin/snapix
      # Install data files
      - install -Dm644 data/io.github.snapix.Snapix.desktop /app/share/applications/io.github.snapix.Snapix.desktop
      - install -Dm644 data/io.github.snapix.Snapix.metainfo.xml /app/share/metainfo/io.github.snapix.Snapix.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.snapix.Snapix.svg /app/share/icons/hicolor/scalable/apps/io.github.snapix.Snapix.svg
    sources:
      - type: dir
        path: ..
        skip:
          - target
          - dist
          - .git
          - .flatpak-builder
          - .flatpak-repo
          - .flatpak-builder-tools
      # Generate this file with scripts/generate-flatpak-sources.sh before
      # building locally or in CI so Flatpak can vendor Cargo dependencies.
      - cargo-sources.json
